# k8s-vectordb-sync controller Helm values for the KubeCon demo.
#
# Watches CRD and resource changes in the cluster, pushes updates to
# cluster-whisperer's HTTP endpoints for vector database synchronization.
#
# Chart: wiggitywhitney/k8s-vectordb-sync (from the separate repo)
# Image: wiggitywhitney/k8s-vectordb-sync (Docker Hub)

image:
  repository: wiggitywhitney/k8s-vectordb-sync
  tag: "0.1.0"
  pullPolicy: IfNotPresent

config:
  # cluster-whisperer serve endpoints (deployed as a pod in the cluster)
  instancesEndpoint: "http://cluster-whisperer.cluster-whisperer:3000/api/v1/instances/sync"
  capabilitiesEndpoint: "http://cluster-whisperer.cluster-whisperer:3000/api/v1/capabilities/scan"
  # Shorter resync for demo — 5 minutes instead of 24 hours
  resyncIntervalMin: 5
  logLevel: "info"

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi
