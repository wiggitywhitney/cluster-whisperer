# Platform-approved managed service — the "needle in the haystack" that
# the cluster-whisperer agent discovers among ~1,000 Crossplane CRDs.
#
# This XRD defines a simplified managed service abstraction that platform
# teams offer to application developers. The intentionally opaque name
# ("ManagedService" in the "platform.acme.io" group) means the agent
# cannot identify this as a PostgreSQL database by scanning CRD names alone —
# it needs semantic search (vector DB) to understand what this resource does.
# The rich field descriptions ensure that `kubectl explain managedservices`
# produces detailed output for the capability inference pipeline to analyze.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: managedservices.platform.acme.io
spec:
  group: platform.acme.io
  names:
    kind: ManagedService
    plural: managedservices
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            description: >-
              Configuration for a platform-approved PostgreSQL database instance.
              Application teams use this resource to request a managed PostgreSQL
              database without needing to understand provider-specific details.
            properties:
              engine:
                type: string
                description: >-
                  Database engine type. Currently only PostgreSQL is supported.
                  The platform team manages engine compatibility and security patches.
                enum:
                  - postgresql
                default: postgresql
              engineVersion:
                type: string
                description: >-
                  PostgreSQL engine version. The platform team validates and
                  approves each version for production use. Defaults to the
                  latest platform-approved version.
                enum:
                  - "17"
                  - "16"
                  - "15"
                  - "14"
                default: "16"
              storageGB:
                type: integer
                description: >-
                  Allocated storage in gigabytes. The database will automatically
                  use SSD-backed storage (gp3) for consistent I/O performance.
                  Can be increased after creation but not decreased.
                minimum: 20
                maximum: 1000
                default: 50
              instanceSize:
                type: string
                description: >-
                  Compute instance size for the database. Small is suitable for
                  development and staging. Medium handles typical production
                  workloads. Large is for high-throughput applications.
                enum:
                  - small
                  - medium
                  - large
                default: small
              highAvailability:
                type: boolean
                description: >-
                  Enable Multi-AZ deployment for automatic failover. When
                  enabled, a standby replica is maintained in a different
                  availability zone. Required for production workloads per
                  platform policy.
                default: false
              backupRetentionDays:
                type: integer
                description: >-
                  Number of days to retain automated backups. Backups are taken
                  daily during the configured maintenance window. Set to 0 to
                  disable automated backups (not recommended for production).
                minimum: 0
                maximum: 35
                default: 7
              networkRef:
                type: string
                description: >-
                  Reference to the platform VPC network where the database will
                  be deployed. Must match a network managed by the platform team.
                  Defaults to the shared application network.
                default: shared-app-network
            required:
              - engine
              - storageGB
          status:
            type: object
            description: >-
              Observed state of the PostgreSQL database instance, populated by
              the platform controller after provisioning.
            properties:
              endpoint:
                type: string
                description: >-
                  Connection endpoint (hostname:port) for the PostgreSQL database.
                  Available after the instance reaches the "ready" state.
              status:
                type: string
                description: >-
                  Current provisioning status of the database instance.
                enum:
                  - creating
                  - available
                  - modifying
                  - deleting
                  - failed
              storageType:
                type: string
                description: >-
                  The storage type provisioned for this instance (e.g., gp3, io1).
