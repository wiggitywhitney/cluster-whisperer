# Curated Crossplane sub-provider subset for the cluster-whisperer demo.
# 16 providers (8 database + 7 variety + provider-kubernetes) generating ~365 CRDs.
# Used by both Kind and GKE modes — enough to feel overwhelming without being wasteful.

