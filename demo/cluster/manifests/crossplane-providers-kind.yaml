# Curated Crossplane sub-provider subset for Kind mode.
# ~35 providers chosen for diverse, recognizable services that generate ~400-600 CRDs
# without overwhelming a single-node Kind cluster.
# GKE mode uses the full batch-0 through batch-5 files instead (all 148 sub-providers).

