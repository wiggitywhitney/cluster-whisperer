# Composition implementing the platform ManagedService XRD using in-cluster PostgreSQL.
#
# Deploys a PostgreSQL Deployment and Service via provider-kubernetes Object
# resources. The Service exposes port 5151 (non-standard, hides PostgreSQL
# from kubectl describe) mapping to the container's native 5432.
#
# When the agent deploys a ManagedService claim, this Composition creates a
# real database — the demo app transitions from CrashLoopBackOff to Running.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: managedservice-in-cluster-pg
  labels:
    provider: kubernetes
    service: postgresql
spec:
  compositeTypeRef:
    apiVersion: platform.acme.io/v1alpha1
    kind: ManagedService
  mode: Pipeline
  pipeline:
  - step: create-postgresql
    functionRef:
      name: crossplane-contrib-function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: postgresql-deployment
        base:
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          spec:
            providerConfigRef:
              name: kubernetes-in-cluster
            forProvider:
              manifest:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: platform-postgresql
                  namespace: default
                  labels:
                    app: platform-postgresql
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      app: platform-postgresql
                  template:
                    metadata:
                      labels:
                        app: platform-postgresql
                    spec:
                      containers:
                      - name: postgresql
                        image: postgres:16-alpine
                        ports:
                        - containerPort: 5432
                        env:
                        - name: POSTGRES_DB
                          value: myapp
                        - name: POSTGRES_USER
                          value: postgres
                        - name: POSTGRES_PASSWORD
                          value: demo-password
                        readinessProbe:
                          exec:
                            command:
                            - pg_isready
                            - -U
                            - postgres
                          initialDelaySeconds: 5
                          periodSeconds: 5
      - name: postgresql-service
        base:
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          spec:
            providerConfigRef:
              name: kubernetes-in-cluster
            forProvider:
              manifest:
                apiVersion: v1
                kind: Service
                metadata:
                  name: db-service
                  namespace: default
                spec:
                  selector:
                    app: platform-postgresql
                  ports:
                  - port: 5151
                    targetPort: 5432
                    protocol: TCP
