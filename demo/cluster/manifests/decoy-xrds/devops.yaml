apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: managedservices.devops.acme.io
spec:
  group: devops.acme.io
  names:
    kind: ManagedService
    plural: managedservices
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            description: >-
              MySQL database for Carlos Reyes's CI/CD Dashboard application.
              Managed by the DevOps team for storing build pipelines, deployment
              history, and infrastructure metrics. Application developers
              request this resource to get a fully managed MySQL instance
              without needing to understand provider-specific details.
            properties:
              engine:
                type: string
                description: >-
                  Database engine type. Currently only MySQL is supported.
                  The devops team manages engine compatibility and security patches.
                enum:
                  - mysql
                default: mysql
              engineVersion:
                type: string
                description: >-
                  MySQL engine version. The devops team validates and
                  approves each version for production use. Defaults to the
                  latest team-approved version.
                enum:
                  - "8.0"
                  - "5.7"
                default: "8.0"
              storageGB:
                type: integer
                description: >-
                  Allocated storage in gigabytes. The database will automatically
                  use SSD-backed storage (gp3) for consistent I/O performance.
                  Can be increased after creation but not decreased.
                minimum: 20
                maximum: 1000
                default: 50
              instanceSize:
                type: string
                description: >-
                  Compute instance size for the database. Small is suitable for
                  development and staging. Medium handles typical production
                  workloads. Large is for high-throughput applications.
                enum:
                  - small
                  - medium
                  - large
                default: small
              highAvailability:
                type: boolean
                description: >-
                  Enable Multi-AZ deployment for automatic failover. When
                  enabled, a standby replica is maintained in a different
                  availability zone. Required for production workloads per
                  team policy.
                default: false
              backupRetentionDays:
                type: integer
                description: >-
                  Number of days to retain automated backups. Backups are taken
                  daily during the configured maintenance window. Set to 0 to
                  disable automated backups (not recommended for production).
                minimum: 0
                maximum: 35
                default: 3
              networkRef:
                type: string
                description: >-
                  Reference to the platform VPC network where the database will
                  be deployed. Must match a network managed by the platform team.
                  Defaults to the shared application network.
                default: shared-app-network
            required:
              - engine
              - storageGB
          status:
            type: object
            description: >-
              Observed state of the managed service instance, populated by
              the platform controller after provisioning.
            properties:
              endpoint:
                type: string
                description: >-
                  Connection endpoint (hostname:port) for the MySQL database.
                  Available after the instance reaches the "ready" state.
              status:
                type: string
                description: >-
                  Current provisioning status of the database instance.
                enum:
                  - creating
                  - available
                  - modifying
                  - deleting
                  - failed
              storageType:
                type: string
                description: >-
                  The storage type provisioned for this instance (e.g., gp3, io1).
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: managedservice-devops-aws-rds
  labels:
    provider: aws
    service: rds
spec:
  compositeTypeRef:
    apiVersion: devops.acme.io/v1alpha1
    kind: ManagedService
  mode: Pipeline
  pipeline:
  - step: create-rds-instance
    functionRef:
      name: crossplane-contrib-function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: rds-instance
        base:
          apiVersion: rds.aws.upbound.io/v1beta2
          kind: Instance
          spec:
            forProvider:
              engine: mysql
              publiclyAccessible: true
              storageType: gp3
              storageEncrypted: true
              skipFinalSnapshot: true
              autoMinorVersionUpgrade: true
        patches:
        # Map engine version from XRD to RDS
        - type: FromCompositeFieldPath
          fromFieldPath: spec.engineVersion
          toFieldPath: spec.forProvider.engineVersion
        # Map storage size from XRD to RDS
        - type: FromCompositeFieldPath
          fromFieldPath: spec.storageGB
          toFieldPath: spec.forProvider.allocatedStorage
        # Map instance size to RDS instance class via lookup
        - type: FromCompositeFieldPath
          fromFieldPath: spec.instanceSize
          toFieldPath: spec.forProvider.instanceClass
          transforms:
          - type: map
            map:
              small: db.t3.micro
              medium: db.r6g.large
              large: db.r6g.2xlarge
        # Map high availability to Multi-AZ
        - type: FromCompositeFieldPath
          fromFieldPath: spec.highAvailability
          toFieldPath: spec.forProvider.multiAz
        # Map backup retention
        - type: FromCompositeFieldPath
          fromFieldPath: spec.backupRetentionDays
          toFieldPath: spec.forProvider.backupRetentionPeriod
        # Write endpoint back to XRD status
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.endpoint
          toFieldPath: status.endpoint
      - name: subnet-group
        base:
          apiVersion: rds.aws.upbound.io/v1beta2
          kind: SubnetGroup
          spec:
            forProvider:
              description: Platform-managed subnet group for MySQL instances
        patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.networkRef
          toFieldPath: metadata.annotations["platform.acme.io/network-ref"]
