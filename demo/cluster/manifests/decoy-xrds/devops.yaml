apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: managedservices.devops.acme.io
spec:
  group: devops.acme.io
  names:
    kind: ManagedService
    plural: managedservices
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            description: >-
              Platform-provided MySQL database provisioned by the Acme
              platform team for the DevOps division. Used by Carlos Reyes's
              CI/CD Dashboard for storing build pipelines, deployment history,
              and infrastructure metrics. Application developers request this
              resource to get a fully managed database instance without needing
              to understand provider-specific details.
            properties:
              engine:
                type: string
                description: >-
                  Database engine type. Currently only MySQL is supported.
                  The devops team manages engine compatibility and security patches.
                enum:
                  - mysql
                default: mysql
              engineVersion:
                type: string
                description: >-
                  MySQL engine version. The devops team validates and
                  approves each version for production use. Defaults to the
                  latest team-approved version.
                enum:
                  - "8.0"
                  - "5.7"
                default: "8.0"
              storageGB:
                type: integer
                description: >-
                  Allocated storage in gigabytes. The database will automatically
                  use SSD-backed storage (gp3) for consistent I/O performance.
                  Can be increased after creation but not decreased.
                minimum: 20
                maximum: 1000
                default: 50
              instanceSize:
                type: string
                description: >-
                  Compute instance size for the database. Small is suitable for
                  development and staging. Medium handles typical production
                  workloads. Large is for high-throughput applications.
                enum:
                  - small
                  - medium
                  - large
                default: small
              highAvailability:
                type: boolean
                description: >-
                  Enable Multi-AZ deployment for automatic failover. When
                  enabled, a standby replica is maintained in a different
                  availability zone. Required for production workloads per
                  team policy.
                default: false
              backupRetentionDays:
                type: integer
                description: >-
                  Number of days to retain automated backups. Backups are taken
                  daily during the configured maintenance window. Set to 0 to
                  disable automated backups (not recommended for production).
                minimum: 0
                maximum: 35
                default: 3
              networkRef:
                type: string
                description: >-
                  Reference to the platform VPC network where the database will
                  be deployed. Must match a network managed by the platform team.
                  Defaults to the shared application network.
                default: shared-app-network
            required:
              - engine
              - storageGB
          status:
            type: object
            description: >-
              Observed state of the managed service instance, populated by
              the platform controller after provisioning.
            properties:
              endpoint:
                type: string
                description: >-
                  Connection endpoint (hostname:port) for the MySQL database.
                  Available after the instance reaches the "ready" state.
              status:
                type: string
                description: >-
                  Current provisioning status of the database instance.
                enum:
                  - creating
                  - available
                  - modifying
                  - deleting
                  - failed
              storageType:
                type: string
                description: >-
                  The storage type provisioned for this instance (e.g., gp3, io1).
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: managedservice-devops-in-cluster-pg
  labels:
    provider: kubernetes
    service: postgresql
spec:
  compositeTypeRef:
    apiVersion: devops.acme.io/v1alpha1
    kind: ManagedService
  mode: Pipeline
  pipeline:
  - step: create-postgresql
    functionRef:
      name: crossplane-contrib-function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: postgresql-deployment
        base:
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          spec:
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-in-cluster
            forProvider:
              manifest:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: devops-postgresql
                  namespace: default
                  labels:
                    app: devops-postgresql
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      app: devops-postgresql
                  template:
                    metadata:
                      labels:
                        app: devops-postgresql
                    spec:
                      containers:
                      - name: mysql
                        image: mysql:8.0
                        ports:
                        - containerPort: 3306
                        env:
                        - name: MYSQL_DATABASE
                          value: myapp
                        - name: MYSQL_USER
                          value: root
                        - name: MYSQL_ROOT_PASSWORD
                          value: demo-password
                        readinessProbe:
                          exec:
                            command: ["mysqladmin", "ping", "-h", "localhost"]
                          initialDelaySeconds: 5
                          periodSeconds: 5
      - name: postgresql-service
        base:
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          spec:
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-in-cluster
            forProvider:
              manifest:
                apiVersion: v1
                kind: Service
                metadata:
                  name: db-service
                  namespace: default
                spec:
                  selector:
                    app: devops-postgresql
                  ports:
                  - port: 5156
                    targetPort: 3306
                    protocol: TCP
