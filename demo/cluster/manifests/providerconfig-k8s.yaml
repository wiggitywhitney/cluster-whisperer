# ClusterProviderConfig for provider-kubernetes using the in-cluster service account.
# Allows namespaced Compositions to create native Kubernetes resources (Deployments,
# Services) without requiring external kubeconfig secrets.
# Uses the v2 namespaced API (kubernetes.m.crossplane.io) so namespaced ManagedService
# XRDs can compose namespaced Object resources.
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: ClusterProviderConfig
metadata:
  name: kubernetes-in-cluster
spec:
  credentials:
    source: InjectedIdentity
