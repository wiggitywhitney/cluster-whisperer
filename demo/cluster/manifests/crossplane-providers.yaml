# Crossplane provider sub-providers for cluster-whisperer demo
#
# Installs ALL AWS and GCP service sub-providers to register 1,200+ CRDs.
# The provider pods will be degraded (no ProviderConfig) but CRDs are fully
# registered and discoverable. This is intentional — the demo only needs
# CRDs for discovery, not actual cloud provisioning.
#
# Generated from the upbound/provider-aws and upbound/provider-gcp repos.
#
# The family providers MUST be listed first — sub-providers depend on them
# for shared ProviderConfig handling.

# Family providers (shared dependencies)
