# Cluster Whisperer Attribute Definitions
# Custom attributes for cluster-whisperer tracing conventions
#
# Categories:
# - OTel References: gen_ai.*, process.*, error.*, db.*, http.*, url.* (imported via ref:)
# - OpenLLMetry: traceloop.* (custom definitions for vendor conventions)
# - Custom: cluster_whisperer.* (project-specific attributes)
#
# Attribute Groups:
# - root:          Root investigation/tool spans (CLI and MCP mode)
# - tool:          Agentic tool execution spans
# - llm:           LLM/chat completion spans (OpenLLMetry auto-instrumented)
# - vercel_llm:    LLM spans from Vercel AI SDK's experimental_telemetry
# - vercel_tool:   Tool call spans from Vercel AI SDK's experimental_telemetry
# - mcp:           MCP tool execution tracking
# - subprocess:    kubectl subprocess execution
# - openllmetry:   Traceloop/OpenLLMetry vendor conventions
# - vectorstore:   Vector database operation spans (ChromaDB)
# - embedding:     Embedding generation spans (Voyage AI)
# - pipeline:      Sync pipeline orchestration spans
# - http:          HTTP server request spans

groups:
  # ==========================================================================
  # ROOT SPAN ATTRIBUTES
  # Used by both CLI mode (withAgentTracing) and MCP mode (withMcpRequestTracing)
  # ==========================================================================
  - id: registry.cluster_whisperer.root
    type: attribute_group
    display_name: Root Span Attributes
    brief: Attributes for root investigation/tool spans
    attributes:
      - id: cluster_whisperer.service.operation
        type: string
        stability: development
        brief: The high-level operation type
        examples: ["investigate", "kubectl_get", "kubectl_describe", "kubectl_logs"]

      - id: cluster_whisperer.invocation.mode
        type:
          members:
            - id: cli
              value: cli
              brief: Invoked via CLI (node dist/index.js)
              stability: development
            - id: mcp
              value: mcp
              brief: Invoked via MCP server (e.g., from Claude Code)
              stability: development
        stability: development
        brief: How the agent was invoked
        note: >
          No OTel semconv exists for invocation mode. The closest analogy is faas.trigger
          (serverless trigger type) but that's scoped to FaaS. This custom attribute follows
          OTel convention of namespacing vendor-specific attributes under the service name.

      - id: cluster_whisperer.user.question
        type: string
        stability: development
        brief: User's natural language question (content-gated)
        note: Only captured when OTEL_CAPTURE_AI_PAYLOADS=true. CLI mode only.
        examples: ["Find the broken pod and tell me why it's failing"]

      - id: gen_ai.input.messages
        type: string
        stability: development
        brief: JSON-stringified input messages in OTel v1.37+ parts format (content-gated)
        note: >
          Only captured when OTEL_CAPTURE_AI_PAYLOADS=true.
          Manual workaround for OpenLLMetry-JS using deprecated gen_ai.prompt.N format.
          Format: [{"role":"user","parts":[{"type":"text","content":"..."}]}]
          See PRD #21 and https://opentelemetry.io/docs/specs/semconv/gen-ai/gen-ai-spans/
        examples: ['[{"role":"user","parts":[{"type":"text","content":"Find the broken pod"}]}]']

      - id: gen_ai.output.messages
        type: string
        stability: development
        brief: JSON-stringified output messages in OTel v1.37+ parts format (content-gated)
        note: >
          Only captured when OTEL_CAPTURE_AI_PAYLOADS=true.
          Manual workaround for OpenLLMetry-JS using deprecated gen_ai.completion.N format.
          Format: [{"role":"assistant","parts":[{"type":"text","content":"..."}],"finish_reason":"end_turn"}]
          See PRD #21 and https://opentelemetry.io/docs/specs/semconv/gen-ai/gen-ai-spans/
        examples: ['[{"role":"assistant","parts":[{"type":"text","content":"The pod is failing..."}],"finish_reason":"end_turn"}]']

  # ==========================================================================
  # TOOL SPAN ATTRIBUTES
  # Used by withToolTracing() for agentic tool execution spans (CLI mode)
  # ==========================================================================
  - id: registry.cluster_whisperer.tool
    type: attribute_group
    display_name: Tool Span Attributes
    brief: GenAI semantic convention attributes for agentic tool execution spans
    note: >
      Set by withToolTracing() on spans created by OpenLLMetry's withTool().
      Both gen_ai.* (OTel GenAI semconv) and traceloop.* (OpenLLMetry) attributes
      coexist on the same span for ecosystem compatibility.
      See PRD #23 and https://opentelemetry.io/docs/specs/semconv/gen-ai/gen-ai-spans/
    attributes:
      # OTel GenAI semantic convention references
      - ref: gen_ai.operation.name
      - ref: gen_ai.tool.name
      - ref: gen_ai.tool.type
      - ref: gen_ai.tool.call.id
      - ref: gen_ai.tool.description

      # Custom gen_ai.tool.call.* attributes
      # These are in the OTel GenAI span spec but not yet in the v1.37.0 registry
      # as standalone attributes. Defined here to document what we set on spans.
      - id: gen_ai.tool.call.arguments
        type: string
        stability: development
        brief: JSON-stringified tool input arguments (content-gated)
        note: >
          Only captured when OTEL_CAPTURE_AI_PAYLOADS=true.
          Not yet a standalone attribute in OTel semconv v1.37.0 registry,
          but part of the execute_tool span spec.
          See https://opentelemetry.io/docs/specs/semconv/gen-ai/gen-ai-spans/
        examples: ['{"resource":"pods","namespace":"all"}']

      - id: gen_ai.tool.call.result
        type: string
        stability: development
        brief: Tool execution result as string (content-gated)
        note: >
          Only captured when OTEL_CAPTURE_AI_PAYLOADS=true.
          Not yet a standalone attribute in OTel semconv v1.37.0 registry,
          but part of the execute_tool span spec.
          See https://opentelemetry.io/docs/specs/semconv/gen-ai/gen-ai-spans/
        examples: ["NAME  READY  STATUS  RESTARTS  AGE\nnginx  1/1  Running  0  5m"]

  # ==========================================================================
  # LLM SPAN ATTRIBUTES
  # Used by chat.anthropic/anthropic.chat spans (OpenLLMetry auto-instrumentation)
  # ==========================================================================
  - id: registry.cluster_whisperer.llm
    type: attribute_group
    display_name: LLM Span Attributes
    brief: GenAI semantic convention attributes for LLM/chat completion spans
    note: >
      Attributes set on chat.anthropic spans created by OpenLLMetry's
      auto-instrumentation of the Anthropic SDK. gen_ai.tool.definitions
      describes which tools were available during each LLM reasoning step.
      See PRD #23 M3 and https://opentelemetry.io/docs/specs/semconv/gen-ai/gen-ai-spans/
    attributes:
      - id: gen_ai.tool.definitions
        type: string
        stability: development
        brief: JSON array of tool definitions available to the LLM
        note: >
          Not yet in OTel semconv v1.37.0 registry.
          Datadog maps this to meta.tool_definitions in LLM Observability.
          Contains tool names, descriptions, and parameter schemas.
        examples: ['[{"name":"kubectl_get","description":"List Kubernetes resources...","parameters":{...}}]']

  # ==========================================================================
  # VERCEL AI SDK LLM SPAN ATTRIBUTES
  # Created by the Vercel AI SDK's experimental_telemetry for streamText calls.
  # These are the SDK's native spans — different from OpenLLMetry spans.
  #
  # Span name mapping (LangGraph vs Vercel):
  #   LangGraph LLM calls: anthropic.chat (OpenLLMetry auto-instrumentation)
  #   Vercel LLM calls:    ai.streamText (outer) / ai.streamText.doStream (inner)
  # Both carry gen_ai.* semconv attributes, but on different span layers.
  # gen_ai.* attributes (system, model, token usage) are ONLY on the inner
  # doStream spans — this is what Datadog LLM Observability reads.
  # ==========================================================================
  - id: registry.cluster_whisperer.vercel_llm
    type: attribute_group
    display_name: Vercel AI SDK LLM Span Attributes
    brief: Attributes for Vercel AI SDK streamText LLM spans
    note: >
      The Vercel AI SDK produces two span layers for each streamText call:
      an outer ai.streamText span (full multi-step invocation) and inner
      ai.streamText.doStream spans (per-step LLM API calls). gen_ai.*
      semantic convention attributes appear ONLY on the inner doStream spans.
      The outer span carries SDK-specific ai.* attributes for aggregated usage.
      Span events ai.stream.firstChunk and ai.stream.finish mark streaming
      lifecycle milestones on the inner doStream spans.
    attributes:
      # --- Outer span: ai.streamText ---
      # Wraps the full multi-step agent invocation (all LLM calls + tool executions)
      - id: ai.model.id
        type: string
        stability: development
        brief: Model identifier on the outer ai.streamText span
        examples: ["claude-sonnet-4-20250514"]

      - id: ai.model.provider
        type: string
        stability: development
        brief: Provider identifier on the outer ai.streamText span
        examples: ["anthropic.messages"]

      - id: ai.usage.promptTokens
        type: int
        stability: development
        brief: Aggregated prompt token count across all steps (outer span)
        note: SDK-specific aggregation. Per-step counts are on doStream spans as gen_ai.usage.input_tokens.
        examples: [1500, 3000]

      - id: ai.usage.completionTokens
        type: int
        stability: development
        brief: Aggregated completion token count across all steps (outer span)
        note: SDK-specific aggregation. Per-step counts are on doStream spans as gen_ai.usage.output_tokens.
        examples: [500, 1200]

      - id: ai.telemetry.functionId
        type: string
        stability: development
        brief: Logical function identifier for the telemetry-enabled call
        note: Set via experimental_telemetry.functionId in the streamText config.
        examples: ["cluster-whisperer-investigate"]

      - id: ai.telemetry.metadata.agent
        type: string
        stability: development
        brief: Custom metadata identifying the agent framework
        note: Set via experimental_telemetry.metadata in the streamText config.
        examples: ["vercel"]

      # --- Inner span: ai.streamText.doStream ---
      # Per-step LLM API call — carries gen_ai.* semconv attributes
      - ref: gen_ai.system
      - ref: gen_ai.request.model
      - ref: gen_ai.usage.input_tokens
      - ref: gen_ai.usage.output_tokens
      - ref: gen_ai.response.model
      - ref: gen_ai.response.id
      - ref: gen_ai.response.finish_reasons

      - id: ai.prompt.messages
        type: string
        stability: development
        brief: JSON-stringified prompt messages sent to the LLM (content-gated)
        note: Only captured when OTEL_CAPTURE_AI_PAYLOADS=true. On inner doStream spans.
        examples: ['[{"role":"system","content":"You are a Kubernetes investigator..."}]']

      - id: ai.prompt.tools
        type: string
        stability: development
        brief: JSON-stringified tool definitions available to the LLM
        note: On inner doStream spans. Contains tool names, descriptions, and input schemas.
        examples: ['[{"name":"kubectl_get","description":"List Kubernetes resources..."}]']

      - id: ai.response.msToFirstChunk
        type: int
        stability: development
        brief: Milliseconds from request start to first response chunk
        note: On inner doStream spans. Measures time-to-first-token latency.
        examples: [450, 1200]

      - id: ai.response.msToFinish
        type: int
        stability: development
        brief: Milliseconds from request start to stream completion
        note: On inner doStream spans. Measures total LLM call duration.
        examples: [3500, 8000]

      # --- Span events on doStream spans ---
      # These are OTel span events (not separate spans). Recorded as events
      # on ai.streamText.doStream spans to mark streaming lifecycle milestones.
      # Event: ai.stream.firstChunk — when the first response chunk arrives
      # Event: ai.stream.finish — when the stream completes
      # Weaver doesn't model span events natively; documented here for reference.

  # ==========================================================================
  # VERCEL AI SDK TOOL CALL SPAN ATTRIBUTES
  # Created by the Vercel AI SDK when the LLM invokes a tool.
  # These are IN ADDITION to our withToolTracing() spans (<toolName>.tool).
  # Both coexist in traces intentionally:
  #   ai.toolCall spans: SDK-generated, carry ai.toolCall.* attributes
  #   <toolName>.tool spans: our custom spans, carry cluster_whisperer.* attributes
  # ==========================================================================
  - id: registry.cluster_whisperer.vercel_tool
    type: attribute_group
    display_name: Vercel AI SDK Tool Call Attributes
    brief: Attributes for Vercel AI SDK ai.toolCall spans
    note: >
      The Vercel AI SDK creates ai.toolCall spans for each tool invocation during
      a streamText agent loop. These are separate from our withToolTracing() spans
      (<toolName>.tool) which carry cluster_whisperer.* attributes. Both span types
      appear in traces and serve different observability purposes: SDK spans show
      the framework's view of tool execution; our spans show domain-specific context.
    attributes:
      - id: ai.toolCall.name
        type: string
        stability: development
        brief: Name of the tool being called
        examples: ["kubectl_get", "kubectl_describe", "kubectl_logs", "vector_search", "kubectl_apply"]

      - id: ai.toolCall.id
        type: string
        stability: development
        brief: Unique identifier for this tool call instance
        examples: ["toolu_01ABC123"]

      - id: ai.toolCall.args
        type: string
        stability: development
        brief: JSON-stringified tool input arguments
        examples: ['{"resource":"pods","namespace":"all"}']

      - id: ai.toolCall.result
        type: string
        stability: development
        brief: JSON-stringified tool execution result
        examples: ["NAME  READY  STATUS  RESTARTS  AGE\nnginx  1/1  Running  0  5m"]

  # ==========================================================================
  # MCP-SPECIFIC ATTRIBUTES
  # Used by MCP mode (withMcpRequestTracing) for tool execution tracking
  # ==========================================================================
  - id: registry.cluster_whisperer.mcp
    type: attribute_group
    display_name: MCP Tool Attributes
    brief: MCP tool execution attributes with GenAI semantic convention references
    attributes:
      - id: cluster_whisperer.mcp.tool.name
        type: string
        stability: development
        brief: The MCP tool name
        note: >
          OTel has MCP semantic conventions (development stability) as of 2025.
          See https://opentelemetry.io/docs/specs/semconv/gen-ai/mcp/
          This custom attribute provides MCP-specific tool identification.
        examples: ["kubectl_get", "kubectl_describe", "kubectl_logs", "investigate"]

      # OTel GenAI semantic convention references
      - ref: gen_ai.operation.name
      - ref: gen_ai.tool.name
      - ref: gen_ai.tool.type
      - ref: gen_ai.tool.call.id

  # ==========================================================================
  # SUBPROCESS ATTRIBUTES
  # Used by kubectl execution spans (src/utils/kubectl.ts)
  # ==========================================================================
  - id: registry.cluster_whisperer.subprocess
    type: attribute_group
    display_name: Subprocess Attributes
    brief: kubectl subprocess execution attributes with Process semantic convention references
    attributes:
      # OTel Process semantic convention references
      - ref: process.executable.name
      - ref: process.command_args
      - ref: process.exit.code

      # OTel Error semantic convention reference
      - ref: error.type

      # Custom k8s attributes
      - id: cluster_whisperer.k8s.namespace
        type: string
        stability: development
        brief: Kubernetes namespace from -n flag
        note: Extracted from command args when -n flag is present
        examples: ["default", "kube-system", "monitoring"]

      - id: cluster_whisperer.k8s.output_size_bytes
        type: int
        stability: development
        brief: Byte length of kubectl stdout
        note: Only set on successful execution. Useful for debugging large responses.
        examples: [1234, 5678, 102400]

  # ==========================================================================
  # OPENLLMETRY ATTRIBUTES
  # Vendor conventions from Traceloop/OpenLLMetry for LLM observability
  # These are not official OTel semconvs but are part of our instrumentation
  # ==========================================================================
  - id: registry.cluster_whisperer.openllmetry
    type: attribute_group
    display_name: OpenLLMetry Attributes
    brief: OpenLLMetry/Traceloop attributes for LLM observability
    note: These are vendor conventions from Traceloop, not official OTel semconvs
    attributes:
      - id: traceloop.span.kind
        type:
          members:
            - id: workflow
              value: workflow
              brief: Top-level workflow span
              stability: development
            - id: tool
              value: tool
              brief: Tool execution span
              stability: development
            - id: task
              value: task
              brief: Task execution span
              stability: development
        stability: development
        brief: OpenLLMetry span category

      - id: traceloop.entity.name
        type: string
        stability: development
        brief: Entity identifier within the span kind
        examples: ["investigate", "kubectl_get", "kubectl_describe"]

      - id: traceloop.entity.input
        type: string
        stability: development
        brief: Input content (content-gated)
        note: Only captured when OTEL_CAPTURE_AI_PAYLOADS=true
        examples: ["{\"question\":\"Find the broken pod\"}"]

      - id: traceloop.entity.output
        type: string
        stability: development
        brief: Output content (content-gated)
        note: Only captured when OTEL_CAPTURE_AI_PAYLOADS=true
        examples: ["The pod 'nginx-broken' is failing due to ImagePullBackOff..."]

  # ==========================================================================
  # VECTOR STORE ATTRIBUTES
  # Used by ChromaBackend spans (src/vectorstore/chroma-backend.ts)
  # ==========================================================================
  - id: registry.cluster_whisperer.vectorstore
    type: attribute_group
    display_name: Vector Store Attributes
    brief: Attributes for vector database operation spans
    note: >
      Set on spans wrapping ChromaBackend method calls (initialize, store, search,
      keywordSearch, delete). Uses OTel DB semantic conventions for standard database
      attributes and custom cluster_whisperer.vectorstore.* for domain-specific metrics.
      SpanKind: CLIENT (outbound network calls to ChromaDB).
    attributes:
      # OTel DB semantic convention references
      - ref: db.system
      - ref: db.operation.name
      - ref: db.collection.name

      # Custom attributes
      - id: cluster_whisperer.vectorstore.document_count
        type: int
        stability: development
        brief: Number of documents in the operation (store batch size, delete batch size)
        examples: [10, 50, 100]

      - id: cluster_whisperer.vectorstore.result_count
        type: int
        stability: development
        brief: Number of results returned from a search query
        examples: [5, 10, 20]

  # ==========================================================================
  # EMBEDDING ATTRIBUTES
  # Used by VoyageEmbedding spans (src/vectorstore/embeddings.ts)
  # ==========================================================================
  - id: registry.cluster_whisperer.embedding
    type: attribute_group
    display_name: Embedding Attributes
    brief: Attributes for embedding generation spans
    note: >
      Set on spans wrapping VoyageEmbedding.embed() calls. Uses OTel GenAI semantic
      conventions for standard AI model attributes and custom cluster_whisperer.embedding.*
      for embedding-specific metrics. SpanKind: CLIENT (outbound HTTP calls to Voyage AI).
    attributes:
      # OTel GenAI semantic convention references
      - ref: gen_ai.operation.name
      - ref: gen_ai.request.model

      # Custom attributes
      - id: cluster_whisperer.embedding.input_count
        type: int
        stability: development
        brief: Number of text inputs sent for embedding
        examples: [1, 10, 50]

      - id: cluster_whisperer.embedding.dimensions
        type: int
        stability: development
        brief: Dimensionality of the returned embedding vectors
        examples: [1024]

  # ==========================================================================
  # PIPELINE ATTRIBUTES
  # Used by sync pipeline spans (src/pipeline/runner.ts, instance-runner.ts)
  # ==========================================================================
  - id: registry.cluster_whisperer.pipeline
    type: attribute_group
    display_name: Pipeline Attributes
    brief: Attributes for sync pipeline orchestration spans
    note: >
      Set on parent pipeline spans and child stage spans for syncCapabilities()
      and syncInstances(). No OTel semconv exists for data pipeline orchestration;
      uses custom cluster_whisperer.pipeline.* namespace. SpanKind: INTERNAL
      (local orchestration, no network boundary).
    attributes:
      - id: cluster_whisperer.pipeline.name
        type: string
        stability: development
        brief: Pipeline identifier
        examples: ["sync-capabilities", "sync-instances"]

      - id: cluster_whisperer.pipeline.stage
        type: string
        stability: development
        brief: Current pipeline stage
        examples: ["discovery", "inference", "storage", "stale-cleanup"]

      - id: cluster_whisperer.pipeline.discovered_count
        type: int
        stability: development
        brief: Number of resources discovered
        examples: [15, 42]

      - id: cluster_whisperer.pipeline.inferred_count
        type: int
        stability: development
        brief: Number of capabilities inferred by LLM
        examples: [8, 30]

      - id: cluster_whisperer.pipeline.stored_count
        type: int
        stability: development
        brief: Number of documents stored
        examples: [8, 30]

      - id: cluster_whisperer.pipeline.deleted_count
        type: int
        stability: development
        brief: Number of stale documents deleted
        examples: [2, 5]

      - id: cluster_whisperer.pipeline.dry_run
        type: boolean
        stability: development
        brief: Whether the pipeline ran in dry-run mode (skip storage)

  # ==========================================================================
  # HTTP SERVER ATTRIBUTES
  # Used by Hono middleware spans (src/api/server.ts)
  # ==========================================================================
  - id: registry.cluster_whisperer.http
    type: attribute_group
    display_name: HTTP Server Attributes
    brief: Attributes for HTTP server request spans
    note: >
      Set on spans wrapping incoming HTTP requests via Hono middleware. Uses OTel HTTP
      semantic conventions for standard request/response attributes and custom
      cluster_whisperer.sync.* for the instance sync endpoint. SpanKind: SERVER
      (inbound request handling). Supports W3C Trace Context propagation from
      upstream services (e.g., k8s-vectordb-sync controller).
    attributes:
      # OTel HTTP semantic convention references
      - ref: http.request.method
      - ref: http.response.status_code
      - ref: http.route
      - ref: url.path

      # Custom attributes for sync endpoint
      - id: cluster_whisperer.sync.upsert_count
        type: int
        stability: development
        brief: Number of upserts in the sync payload
        examples: [5, 20]

      - id: cluster_whisperer.sync.delete_count
        type: int
        stability: development
        brief: Number of deletes in the sync payload
        examples: [2, 10]
